name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  BINARY_NAME: kimi-compatible
  GO_VERSION: "1.22"
  REGISTRY: ghcr.io

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

  build-binaries:
    name: Binary ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          package="${BINARY_NAME}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${package}"
          go build -trimpath -ldflags="-s -w" -o "dist/${package}/${BINARY_NAME}${{ matrix.ext }}" ./cmd/server
          cp README.md LICENSE args.example "dist/${package}/"

      - name: Package archive
        working-directory: dist
        run: |
          package="${BINARY_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "${package}" && zip -r "../${package}.zip" .)
          else
            tar -czf "${package}.tar.gz" "${package}"
          fi
          sha256sum "${package}.${{ matrix.archive }}" > "${package}.${{ matrix.archive }}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ env.BINARY_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
            dist/${{ env.BINARY_NAME }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 14

  release-latest:
    name: Latest release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: github.event_name != 'pull_request' && (github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.BINARY_NAME }}-*
          path: release-assets
          merge-multiple: true

      - name: Create checksum manifest
        working-directory: release-assets
        run: sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Move Latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f Latest "${GITHUB_SHA}"
          git push --force origin refs/tags/Latest

      - name: Publish rolling Latest release
        uses: ncipollo/release-action@v1
        with:
          tag: Latest
          name: Latest
          commit: ${{ github.sha }}
          body: |
            Rolling release generated from `${{ github.sha }}`.

            Assets include cross-platform binaries, per-archive SHA-256 files, and a combined `SHA256SUMS` manifest.
          artifacts: release-assets/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          makeLatest: true

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
